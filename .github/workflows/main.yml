name: Practice Github Actions
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: install dependencies
        run: |
          make install
      - name: lint with pylint
        run: |
          make lint
      - name: format
        run: |
          make format
      - name: test with pytest
        run: |
          make test
